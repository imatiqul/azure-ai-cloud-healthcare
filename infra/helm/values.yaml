global:
  namespace: healthq-copilot
  registry: healthqcopilot.azurecr.io
  imagePullPolicy: Always
  env: production
  tenantId: "" # Set via values.production.yaml or --set global.tenantId=<tenant-id>

services:
  voice:
    name: voice-service
    port: 8080
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    image:
      repository: healthq-copilot/voice
      tag: latest
    workloadIdentity:
      clientId: "" # Set via values.production.yaml: voice managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  ai-agent:
    name: ai-agent-service
    port: 8080
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 60
    startupProbe:
      initialDelaySeconds: 30
    image:
      repository: healthq-copilot/ai-agent
      tag: latest
    workloadIdentity:
      clientId: "" # ai-agent managed identity client ID
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
    nodeSelector:
      workload: ai
    tolerations:
      - key: workload
        value: ai
        effect: NoSchedule
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  fhir:
    name: fhir-service
    port: 8080
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    startupProbe:
      initialDelaySeconds: 30
    image:
      repository: healthq-copilot/fhir
      tag: latest
    workloadIdentity:
      clientId: "" # fhir managed identity client ID
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector:
      workload: api
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  identity:
    name: identity-service
    port: 8080
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
