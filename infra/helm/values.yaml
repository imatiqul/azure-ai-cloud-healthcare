        memory: 2Gi
    nodeSelector:
      workload: batch
    tolerations:
      - key: kubernetes.azure.com/scalesetpriority
        value: spot
        effect: NoSchedule
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  revenue:
    name: revenue-service
    port: 8080
    replicas: 2
    autoscaling:
