{{- range $key, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    version: {{ $svc.image.tag }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
        azure.workload.identity/use: "true"
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ $svc.name }}
        dapr.io/app-port: "{{ $svc.port }}"
        dapr.io/log-level: "warn"
        dapr.io/config: "healthcare-config"
        dapr.io/enable-metrics: "true"
        dapr.io/metrics-port: "9090"
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: {{ $svc.name }}-sa
      {{- if $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml $svc.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $svc.tolerations }}
      tolerations:
        {{- toYaml $svc.tolerations | nindent 8 }}
      {{- end }}
      # Pod-level security context — HIPAA/OWASP baseline
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        # ASP.NET Core requires a writable temp directory even with a read-only root filesystem
        - name: tmp
          emptyDir: {}
        - name: aspnet-data-protection
          emptyDir: {}
      containers:
        - name: {{ $svc.name }}
          image: {{ $.Values.global.registry }}/{{ $svc.image.repository }}:{{ $svc.image.tag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
          # Container-level security context — least-privilege enforcement
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: aspnet-data-protection
              mountPath: /home/app/.aspnet/DataProtection-Keys
          env:
            {{- range $envKey, $envVal := $svc.env }}
            - name: {{ $envKey }}
              value: "{{ $envVal }}"
            {{- end }}
            # OpenTelemetry tracing environment variables
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              value: "{{ $svc.name }}"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $svc.name }},service.namespace={{ $.Values.global.namespace }}"
            # ASP.NET Core temp / data-protection paths (required with readOnlyRootFilesystem)
            - name: TMPDIR
              value: /tmp
            - name: DOTNET_CLI_HOME
              value: /tmp
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: {{ dig "startupProbe" "initialDelaySeconds" 10 $svc }}
            periodSeconds: 5
            failureThreshold: 30
{{- end }}
