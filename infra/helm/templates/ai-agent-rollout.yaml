apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ai-agent-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.ai-agent.replicas }}
  selector:
    matchLabels:
      app: ai-agent-service
  template:
    metadata:
      labels:
        app: ai-agent-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: ai-agent-service
        dapr.io/app-port: "8080"
    spec:
      serviceAccountName: ai-agent-service-sa
      nodeSelector:
        workload: ai
      tolerations:
        - key: workload
          value: ai
          effect: NoSchedule
      containers:
        - name: ai-agent-service
          image: {{ .Values.global.registry }}/{{ index .Values.services "ai-agent" "image" "repository" }}:{{ index .Values.services "ai-agent" "image" "tag" }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml (index .Values.services "ai-agent" "resources") | nindent 12 }}
          {{- if .Values.presidio.enabled }}
          env:
            - name: Presidio__AnalyzerEndpoint
              value: "http://localhost:5001"
            - name: Presidio__TimeoutMs
              value: "{{ .Values.presidio.timeoutMs | default 2000 }}"
            - name: Presidio__MinScore
              value: "{{ .Values.presidio.minScore | default 0.5 }}"
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- if .Values.presidio.enabled }}
        # ── W1.1 — Microsoft Presidio analyzer sidecar ─────────────────────────
        # Runs in the same pod so PHI never leaves the network boundary on its
        # way to the redactor. Bound to localhost via the shared pod network
        # namespace; ai-agent-service reads Presidio:AnalyzerEndpoint from env.
        - name: presidio-analyzer
          image: "{{ .Values.presidio.analyzer.image }}:{{ .Values.presidio.analyzer.tag }}"
          ports:
            - containerPort: 5001
              name: analyzer
          resources:
            {{- toYaml .Values.presidio.analyzer.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
        {{- end }}
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: hallucination-rate-check
              - templateName: api-success-rate
        - setWeight: 30
        - pause: { duration: 10m }
        - analysis:
            templates:
              - templateName: hallucination-rate-check
        - setWeight: 60
        - pause: { duration: 10m }
        - setWeight: 100
      canaryService: ai-agent-canary
      stableService: ai-agent-stable
      trafficRouting:
        nginx:
          stableIngress: ai-agent-ingress
