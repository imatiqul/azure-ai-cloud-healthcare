---
# Prometheus PrometheusRule — Healthcare AI Platform
# 5 Golden Signals: Latency, Traffic, Errors, Saturation, and AI Safety
#
# Applied by infra-deploy.yml via `kubectl apply -f infra/k8s/monitoring/`
# Consumed by kube-prometheus-stack (Prometheus Operator).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: healthq-copilot-recording-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: healthq-copilot
spec:
  groups:
    # ── 1. Request Latency ─────────────────────────────────────────────────
    - name: healthq.latency
      interval: 30s
      rules:
        - record: job:http_request_duration_seconds:p50
          expr: |
            histogram_quantile(0.50,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le))

        - record: job:http_request_duration_seconds:p95
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le))

        - record: job:http_request_duration_seconds:p99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le))

    # ── 2. Request Traffic (RPS) ───────────────────────────────────────────
    - name: healthq.traffic
      interval: 30s
      rules:
        - record: job:http_requests_total:rate5m
          expr: |
            sum(rate(http_requests_total[5m])) by (job)

        - record: job:http_requests_total:rate1h
          expr: |
            sum(rate(http_requests_total[1h])) by (job)

    # ── 3. Error Rate ──────────────────────────────────────────────────────
    - name: healthq.errors
      interval: 30s
      rules:
        - record: job:http_requests_errors:rate5m
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)

        - record: job:http_error_ratio:rate5m
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total[5m])) by (job)

    # ── 4. Saturation (CPU + Memory) ──────────────────────────────────────
    - name: healthq.saturation
      interval: 60s
      rules:
        - record: namespace_pod:container_cpu_usage_seconds_total:rate5m
          expr: |
            sum(rate(container_cpu_usage_seconds_total{
              namespace="healthq-copilot",
              container!=""
            }[5m])) by (pod, container)

        - record: namespace_pod:container_memory_working_set_bytes:avg
          expr: |
            avg(container_memory_working_set_bytes{
              namespace="healthq-copilot",
              container!=""
            }) by (pod, container)

    # ── 5. AI Safety — Hallucination Guard Verdict Rate ───────────────────
    - name: healthq.ai_safety
      interval: 30s
      rules:
        - record: agent:guard_unsafe_ratio:rate5m
          expr: |
            sum(rate(agent_guard_verdict_total{verdict="unsafe"}[5m])) by (agent)
            /
            (sum(rate(agent_guard_verdict_total[5m])) by (agent) > 0)
          labels:
            signal: ai_safety

        - record: agent:guard_verdict_total:rate5m
          expr: |
            sum(rate(agent_guard_verdict_total[5m])) by (agent, verdict)

        - record: agent:guard_unsafe_ratio:rate1h
          expr: |
            sum(rate(agent_guard_verdict_total{verdict="unsafe"}[1h])) by (agent)
            /
            (sum(rate(agent_guard_verdict_total[1h])) by (agent) > 0)

    # ── 6. FHIR / Clinical Operations ─────────────────────────────────────
    - name: healthq.fhir
      interval: 60s
      rules:
        - record: job:fhir_operations_total:rate5m
          expr: |
            sum(rate(fhir_operations_total[5m])) by (job, operation, resource_type)

        - record: job:fhir_operation_errors:rate5m
          expr: |
            sum(rate(fhir_operations_total{status="error"}[5m])) by (job)

    # ── 7. Triage Throughput ───────────────────────────────────────────────
    - name: healthq.triage
      interval: 60s
      rules:
        - record: job:triage_completed_total:rate5m
          expr: |
            sum(rate(triage_completed_total[5m])) by (level)

        - record: job:triage_latency_seconds:p95
          expr: |
            histogram_quantile(0.95,
              sum(rate(triage_latency_seconds_bucket[5m])) by (le))

---
# Alerting rules for SLO breaches
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: healthq-copilot-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: healthq-copilot
spec:
  groups:
    - name: healthq.slos
      rules:
        - alert: HighErrorRate
          expr: job:http_error_ratio:rate5m > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High HTTP error rate on {{ $labels.job }}"
            description: "{{ $labels.job }} error ratio is {{ $value | humanizePercentage }} (threshold 5%)"

        - alert: CriticalErrorRate
          expr: job:http_error_ratio:rate5m > 0.10
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Critical HTTP error rate on {{ $labels.job }}"
            description: "{{ $labels.job }} error ratio is {{ $value | humanizePercentage }} (threshold 10%)"

        - alert: HighP99Latency
          expr: job:http_request_duration_seconds:p99 > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P99 latency > 5s on {{ $labels.job }}"
            description: "P99 latency is {{ $value }}s for {{ $labels.job }}"

        - alert: AIGuardUnsafeRatioHigh
          expr: agent:guard_unsafe_ratio:rate5m > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "AI hallucination guard unsafe ratio above 5% for {{ $labels.agent }}"
            description: "Guard unsafe ratio is {{ $value | humanizePercentage }} — canary deployment may be blocked"

    # P4.4 — agent LLM cost guardrails. Sources: `agent_llm_cost_usd_total`
    # counter (W4.2, emitted by LlmUsageTracker). Three-tier strategy:
    #   1. Monthly budget projection — extrapolate the last 24h spend rate to
    #      a 30-day window and alert before the bill arrives.
    #   2. Hourly spike — catches a runaway loop or accidental upgrade to a
    #      pricier model SKU within the hour, well before the daily projection
    #      moves enough to trigger (1).
    #   3. Per-tenant ceiling — protects against a single tenant exhausting
    #      the platform-wide quota; tagged on the metric since W4.2.
    # Defaults sized for the documented gpt-4o-mini baseline (~$0.50 / 1k req)
    # at 50 RPS sustained = ~$1.5/hr platform-wide. Adjust DEFAULT_*_USD via
    # Prometheus `external_labels` overlay or kustomize patch per environment.
    - name: agent.cost
      rules:
        # Recording: 24h spend rate per service, USD/hour
        - record: agent:llm_cost_usd:rate1h
          expr: |
            sum(rate(agent_llm_cost_usd_total[1h])) by (service) * 3600

        # Recording: projected 30-day spend, USD, based on the trailing 24h.
        # Rate over 24h × 86400 s/day × 30 days = USD per month at current pace.
        - record: agent:llm_cost_usd:projected_30d
          expr: |
            sum(rate(agent_llm_cost_usd_total[24h])) by (service) * 86400 * 30

        # Recording: per-tenant 24h spend, USD
        - record: agent:llm_cost_usd:by_tenant_24h
          expr: |
            sum(increase(agent_llm_cost_usd_total[24h])) by (tenant)

        - alert: AgentLlmMonthlyBudgetForecastHigh
          # Trip when the projected monthly spend exceeds 80% of the
          # platform monthly budget envelope ($5,000 default for staging,
          # set via env-specific overlay for prod).
          expr: agent:llm_cost_usd:projected_30d > 4000
          for: 1h
          labels:
            severity: warning
            workstream: agent-cost
          annotations:
            summary: "Agent LLM 30d spend forecast > $4,000 for {{ $labels.service }}"
            description: |
              Trailing-24h burn rate projects to {{ $value | humanize }} USD/month
              for {{ $labels.service }}, above the 80%-of-budget early-warning
              threshold. Investigate via the agent-cost.json dashboard
              (panels: 24h+1h spend stats, USD/min by model, top-10 sessions).

        - alert: AgentLlmMonthlyBudgetForecastCritical
          # 100% of envelope — paging severity. Same dashboard for triage.
          expr: agent:llm_cost_usd:projected_30d > 5000
          for: 30m
          labels:
            severity: critical
            workstream: agent-cost
          annotations:
            summary: "Agent LLM 30d spend forecast > $5,000 (budget envelope) for {{ $labels.service }}"
            description: |
              Trailing-24h burn rate projects to {{ $value | humanize }} USD/month
              for {{ $labels.service }}. At or above the platform monthly budget
              ceiling. Page the on-call to either provision additional budget or
              throttle traffic.

        - alert: AgentLlmHourlySpendSpike
          # Catches a sudden 5x deviation vs the trailing-6h baseline. Faster
          # than the daily-projection alerts; designed to fire on a runaway
          # planning loop (see W2.6 budget) or an accidental gpt-4o promotion.
          expr: |
            sum(rate(agent_llm_cost_usd_total[10m])) by (service)
              >
            (avg_over_time(agent:llm_cost_usd:rate1h[6h] offset 10m) / 3600) * 5
            and
            sum(rate(agent_llm_cost_usd_total[10m])) by (service) > (1 / 3600)
          for: 10m
          labels:
            severity: warning
            workstream: agent-cost
          annotations:
            summary: "Agent LLM spend rate spiked 5x for {{ $labels.service }}"
            description: |
              10-min spend rate for {{ $labels.service }} is more than 5x the
              trailing-6h baseline. Common causes: runaway planning loop,
              accidental promotion to a pricier model SKU, or an attack
              exhausting prompts. Cross-check `agent_planning_loop_ms{outcome="budget_*"}`
              and `agent_tokens_total{model="..."}` rate by model.

        - alert: AgentLlmTenantDailyBudgetHigh
          # $50/tenant/day default cap. Tenants with paid SKUs override via
          # recording-rules-overrides.yaml in the env overlay.
          expr: agent:llm_cost_usd:by_tenant_24h > 50
          for: 30m
          labels:
            severity: warning
            workstream: agent-cost
          annotations:
            summary: "Tenant {{ $labels.tenant }} 24h LLM spend > $50"
            description: |
              Tenant {{ $labels.tenant }} has accrued {{ $value | humanize }} USD
              in agent LLM cost over the last 24h, above the per-tenant daily
              soft cap. Verify expected usage; if legitimate, raise the cap in
              the env overlay.

    # P4.3 — ClinicalEval + CriticReview safety signals.
    # Sources:
    #   agent_eval_pass_rate{suite="triage"}  — emitted by ClinicalEvaluator
    #     after each POST /api/v1/governance/evaluate run.
    #   agent_critic_rejected_total            — incremented by CriticAgent on
    #     every UNSUPPORTED verdict (W2.3).
    #   agent_critic_reviewed_total            — incremented by CriticAgent on
    #     every review call (denominator for rejection ratio).
    - name: agent.eval_critic
      rules:
        # Recording: 5-min critic rejection ratio (rolling).
        # Used by Argo AnalysisTemplate overlay guard in P4.3 runbook
        # and as a leading indicator in the agent-quality.json dashboard.
        - record: agent:critic_rejection_ratio:rate5m
          expr: |
            sum(rate(agent_critic_rejected_total[5m])) by (agent)
            /
            (sum(rate(agent_critic_reviewed_total[5m])) by (agent) > 0)

        # Alert: evaluation harness pass rate has fallen below the steady-state
        # floor (90% = canary gate; 80% = immediate rollback per P4.3 runbook).
        # Fires on the warn threshold so ops have time to investigate before
        # the critical rollback threshold is breached.
        - alert: AgentEvalPassRateLow
          expr: agent_eval_pass_rate{suite="triage"} < 0.90
          for: 10m
          labels:
            severity: warning
            workstream: agent-eval
          annotations:
            summary: "Clinical eval harness pass rate below 90% for suite={{ $labels.suite }}"
            description: |
              agent_eval_pass_rate{suite="{{ $labels.suite }}"} = {{ $value | humanizePercentage }},
              below the 90% steady-state floor. Investigate via:
                kubectl logs -n healthq-copilot -l app=eval-cronjob --tail=200
              If pass rate is < 80% for > 5 min, roll back HealthQ:ClinicalEval
              and HealthQ:CriticReview to 0% as per the P4.3 runbook.

        # Alert: critic is rejecting too many reasoning chains — suggests the
        # RAG context quality has degraded or the prompt version has changed
        # without a corresponding eval gate pass.  Steady-state ceiling: 15%
        # (canary gate); critical rollback gate: 30%.
        - alert: AgentCriticRejectionRateHigh
          expr: agent:critic_rejection_ratio:rate5m > 0.15
          for: 5m
          labels:
            severity: warning
            workstream: agent-eval
          annotations:
            summary: "Critic rejection rate > 15% for {{ $labels.agent }}"
            description: |
              5-min rolling critic rejection ratio for {{ $labels.agent }} is
              {{ $value | humanizePercentage }}, above the 15% canary gate.
              Root causes: RAG context degradation, prompt version mismatch,
              or a genuine increase in low-quality LLM responses.
              At > 30% sustained for 5 min, roll back HealthQ:CriticReview
              immediately (clinical safety risk per P4.3 runbook § 7).

        - alert: AgentCriticRejectionRateCritical
          expr: agent:critic_rejection_ratio:rate5m > 0.30
          for: 5m
          labels:
            severity: critical
            workstream: agent-eval
          annotations:
            summary: "Critic rejection rate > 30% (clinical safety risk) for {{ $labels.agent }}"
            description: |
              5-min rolling critic rejection ratio for {{ $labels.agent }} is
              {{ $value | humanizePercentage }}, above the clinical-safety rollback
              threshold defined in the P4.3 runbook § 7. Page the on-call and
              roll back HealthQ:CriticReview to 0% immediately.
