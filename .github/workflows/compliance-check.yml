name: Compliance & Security Checks

# Runs weekly on Monday and can be triggered manually.
# Scheduled scans ensure continuous compliance posture — HIPAA §164.308(a)(8).
on:
  schedule:
    # Monday 08:00 UTC — findings reviewed during business hours
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      skip_zap:
        description: 'Skip OWASP ZAP full scan (faster)'
        required: false
        default: 'false'
      skip_load_test:
        description: 'Skip k6 load test'
        required: false
        default: 'false'

permissions:
  contents: read
  security-events: write   # for SARIF upload
  issues: write            # for Gitleaks issue creation

env:
  APIM_BASE: https://healthq-copilot-apim.azure-api.net
  SHELL_URL:  https://gentle-tree-03115af0f.7.azurestaticapps.net

jobs:
  # ── 0. Gitleaks: Secret scanning ────────────────────────────────────────
  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for git log scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional: only needed for private repos with SAAS gitleaks
        with:
          args: detect --source . --exit-code 1 --report-format sarif --report-path gitleaks-results.sarif --redact
        continue-on-error: true   # collect SARIF first; gate below

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
        continue-on-error: true   # SARIF upload may fail if no results file

      - name: Gate on secrets found
        run: |
          if [ -f gitleaks-results.sarif ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('gitleaks-results.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo 0)
            echo "Gitleaks findings: $COUNT"
            if [ "$COUNT" -gt 0 ]; then
              echo "::error::$COUNT secrets detected in the repository — HIPAA §164.312(a)(2)(iv) — rotate credentials immediately"
              exit 1
            fi
          fi
          echo "✅ No secrets detected"

  # ── 1. Trivy: Container & File-System CVE scan ─────────────────────────────
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'   # collect report; gate separately below

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Gate on CRITICAL CVEs
        run: |
          CRITICAL=$(cat trivy-results.sarif \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          runs=d.get('runs',[])
          n=sum(1 for r in runs for result in r.get('results',[])
                if result.get('ruleId','').startswith('CVE')
                and any(l.get('properties',{}).get('cvss',0)>=9.0
                        for l in result.get('locations',[])))
          print(n)
          " 2>/dev/null || \
            grep -c '"level": "error"' trivy-results.sarif || echo 0)
          echo "Critical findings: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::$CRITICAL CRITICAL CVEs found — pipeline blocked"
            exit 1
          fi

  prepare-live-data:
    name: Prepare Live Seed Data
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: github.event.inputs.skip_zap != 'true' || github.event.inputs.skip_load_test != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Seed live APIM data
        run: bash .github/scripts/prepare-live-seed-data.sh
        env:
          LIVE_API_BASE_URL: ${{ env.APIM_BASE }}

  # ── 2. OWASP ZAP: Full API Scan ───────────────────────────────────────────
  owasp-zap:
    name: OWASP ZAP Full Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_zap != 'true'
    needs: [trivy-scan, prepare-live-data]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ZAP Full Scan against APIM
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ env.APIM_BASE }}
          rules_file_name: '.github/zap-rules.tsv'
          cmd_options: '-a -j'
          fail_action: false   # collect report first

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: report_html.html

      - name: Gate on HIGH ZAP findings
        run: |
          HIGH=$(grep -c '"riskdesc": "High' report_json.json 2>/dev/null || echo 0)
          echo "ZAP HIGH findings: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::$HIGH HIGH-severity ZAP findings — remediate before merge"
            exit 1
          fi

  # ── 3. k6 Load Test ───────────────────────────────────────────────────────
  k6-load-test:
    name: k6 Performance Gate
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_load_test != 'true'
    needs: [trivy-scan, prepare-live-data]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      - name: Write k6 load test script
        run: |
          cat > k6-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Rate, Trend } from 'k6/metrics';

          const errorRate = new Rate('errors');
          const triagedLatency = new Trend('triage_latency');

          export const options = {
            // Sprint 11: 100 concurrent sessions, P95 < 2s gate
            stages: [
              { duration: '30s', target: 20  },  // warm-up
              { duration: '1m',  target: 100 },  // ramp to 100 concurrent sessions
              { duration: '2m',  target: 100 },  // sustained load
              { duration: '30s', target: 0   },  // ramp-down
            ],
            thresholds: {
              http_req_duration: ['p(95)<2000'],   // P95 < 2s (KPI gate)
              errors: ['rate<0.01'],               // Error rate < 1% (tightened Sprint 11)
              triage_latency: ['p(95)<5000'],      // Triage P95 < 5s
            },
          };

          const BASE = __ENV.APIM_BASE || 'https://healthq-copilot-apim.azure-api.net';

          export default function () {
            // Health check endpoints
            const healthRes = http.get(`${BASE}/api/v1/voice/health`);
            check(healthRes, { 'voice health 200': (r) => r.status === 200 });
            errorRate.add(healthRes.status !== 200);

            const popRes = http.get(`${BASE}/api/v1/population-health/stats`);
            check(popRes, { 'pophealth stats 200': (r) => r.status === 200 });
            errorRate.add(popRes.status !== 200);

            // Triage submit (anonymised)
            const start = Date.now();
            const triageRes = http.post(
              `${BASE}/api/v1/agents/triage`,
              JSON.stringify({
                sessionId: '00000000-0000-0000-0000-000000000001',
                transcriptText: 'Patient has mild headache for two days',
              }),
              { headers: { 'Content-Type': 'application/json' } },
            );
            triagedLatency.add(Date.now() - start);
            check(triageRes, { 'triage accepted': (r) => r.status < 500 });

            sleep(1);
          }
          EOF

      - name: Run k6 load test
        env:
          APIM_BASE: ${{ env.APIM_BASE }}
        run: k6 run --env APIM_BASE=$APIM_BASE k6-test.js

  # ── 4. Lighthouse CI — Frontend Performance ───────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LHCI
        run: npm install -g @lhci/cli@0.14.x

      - name: Write lighthouserc
        run: |
          cat > .lighthouserc.json << EOF
          {
            "ci": {
              "collect": {
                "url": ["${{ env.SHELL_URL }}"],
                "numberOfRuns": 3
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["error", {"minScore": 0.90}],
                  "categories:accessibility": ["warn",  {"minScore": 0.85}],
                  "categories:best-practices": ["error", {"minScore": 0.90}],
                  "categories:seo": ["warn", {"minScore": 0.80}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

      - name: Run Lighthouse CI
        run: lhci autorun --config=.lighthouserc.json

  # ── 5. NuGet vulnerability scan ──────────────────────────────────────────
  nuget-vuln-scan:
    name: NuGet Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Check for known vulnerabilities in NuGet packages
        id: vuln
        run: |
          set +e
          dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/nuget-vuln.txt
          CRITICAL=$(grep -c "Critical" /tmp/nuget-vuln.txt || true)
          HIGH=$(grep -c "High" /tmp/nuget-vuln.txt || true)
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"

          {
            echo "## NuGet Vulnerability Scan"
            echo ""
            echo "Critical: $CRITICAL  High: $HIGH"
            echo ""
            echo '```'
            cat /tmp/nuget-vuln.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload NuGet vulnerability report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nuget-vuln-report
          path: /tmp/nuget-vuln.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Fail on Critical NuGet vulnerabilities
        if: steps.vuln.outputs.critical != '0'
        run: |
          echo "::error::${{ steps.vuln.outputs.critical }} Critical NuGet vulnerabilities found — update affected packages"
          exit 1

  # ── 6. npm audit ─────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Run npm audit (high and critical)
        id: audit
        working-directory: frontend
        run: |
          set +e
          npm audit --audit-level=high --json > /tmp/npm-audit.json 2>&1
          EXIT_CODE=$?

          CRITICAL=$(node -e "try{const d=require('/tmp/npm-audit.json');console.log((d.metadata?.vulnerabilities?.critical)||0)}catch(e){console.log(0)}")
          HIGH=$(node -e "try{const d=require('/tmp/npm-audit.json');console.log((d.metadata?.vulnerabilities?.high)||0)}catch(e){console.log(0)}")

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          {
            echo "## npm Audit"
            echo ""
            echo "Critical: $CRITICAL  High: $HIGH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: /tmp/npm-audit.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail on Critical or High npm vulnerabilities
        if: steps.audit.outputs.exit_code != '0'
        env:
          CRITICAL: ${{ steps.audit.outputs.critical }}
          HIGH: ${{ steps.audit.outputs.high }}
        run: |
          echo "::error::npm audit found Critical (${CRITICAL}) or High (${HIGH}) severity vulnerabilities"
          exit 1

  # ── 7. Key Vault HIPAA Audit (Sprint 11) ─────────────────────────────────
  # HIPAA §164.312(a)(2)(iv) — encryption & access controls.
  # Verifies:
  #  a) No Container App environment variables contain raw secrets (all must be
  #     Key Vault references or managed-identity sourced config).
  #  b) Key Vault access policies grant to Managed Identities only — no
  #     service-principal client-secret grants.
  #  c) Key Vault has soft-delete + purge-protection enabled.
  keyvault-audit:
    name: Key Vault HIPAA Audit
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        id: azure-login
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure login (service principal secret fallback)
        if: steps.azure-login.outcome != 'success'
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Audit Container App env vars for raw secrets
        id: env-audit
        env:
          ACA_RG: healthq-copilot-rg
        run: |
          set -euo pipefail
          SERVICES=(voice ai-agent fhir identity ocr scheduling notification pop-health revenue gateway)
          VIOLATIONS=0

          # Patterns that suggest a raw secret value rather than a Key Vault reference
          # Key Vault references look like: secretref:<name>  or  @Microsoft.KeyVault(...)
          SECRET_PATTERNS='password|secret|key|token|connectionstring|apikey|pwd|clientsecret'

          for SVC in "${SERVICES[@]}"; do
            ENV_VARS=$(az containerapp show \
              --name "$SVC" --resource-group "$ACA_RG" \
              --query "properties.template.containers[0].env" \
              -o json 2>/dev/null || echo "[]")

            if [ "$ENV_VARS" = "null" ] || [ "$ENV_VARS" = "[]" ]; then
              echo "  ✅ $SVC — no environment variables"
              continue
            fi

            # Flag any env var whose NAME matches secret patterns but VALUE is a plain string
            # (not a KV reference: secretref:  or @Microsoft.KeyVault)
            PLAIN_SECRETS=$(echo "$ENV_VARS" | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          pattern = re.compile(r'$SECRET_PATTERNS', re.IGNORECASE)
          kv_ref   = re.compile(r'secretref:|@Microsoft\.KeyVault\(', re.IGNORECASE)
          bad = []
          for item in data:
              name  = item.get('name', '')
              value = item.get('value', '')
              if pattern.search(name) and value and not kv_ref.search(value):
                  bad.append(name)
          print('\n'.join(bad))
          " 2>/dev/null || true)

            if [ -n "$PLAIN_SECRETS" ]; then
              echo "  ❌ $SVC — raw secret env vars detected: $PLAIN_SECRETS"
              VIOLATIONS=$((VIOLATIONS+1))
            else
              echo "  ✅ $SVC — all secret env vars sourced from Key Vault"
            fi
          done

          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS ACA service(s) have raw secret env vars — move to Key Vault references (HIPAA §164.312)"
            exit 1
          fi

      - name: Audit Key Vault access policies (Managed Identity only)
        id: kv-policy-audit
        env:
          ACA_RG: healthq-copilot-rg
        run: |
          set -euo pipefail
          # List all Key Vaults in the resource group
          KV_LIST=$(az keyvault list --resource-group "$ACA_RG" --query "[].name" -o tsv 2>/dev/null || echo "")

          if [ -z "$KV_LIST" ]; then
            echo "::warning::No Key Vaults found in $ACA_RG — skipping policy audit"
            exit 0
          fi

          VIOLATIONS=0
          for KV in $KV_LIST; do
            echo ""
            echo "── Auditing Key Vault: $KV"

            # Check soft-delete + purge protection
            SOFT_DELETE=$(az keyvault show --name "$KV" --query "properties.enableSoftDelete" -o tsv 2>/dev/null || echo "false")
            PURGE_PROT=$(az keyvault show --name "$KV" --query "properties.enablePurgeProtection" -o tsv 2>/dev/null || echo "false")

            if [ "$SOFT_DELETE" != "true" ]; then
              echo "  ❌ $KV — soft-delete NOT enabled (HIPAA data integrity)"
              VIOLATIONS=$((VIOLATIONS+1))
            else
              echo "  ✅ $KV — soft-delete enabled"
            fi

            if [ "$PURGE_PROT" != "true" ]; then
              echo "  ⚠️  $KV — purge-protection not enabled (recommended for HIPAA)"
            else
              echo "  ✅ $KV — purge-protection enabled"
            fi

            # Check RBAC model (preferred) vs access policies with service-principal keys
            ENABLE_RBAC=$(az keyvault show --name "$KV" --query "properties.enableRbacAuthorization" -o tsv 2>/dev/null || echo "false")
            if [ "$ENABLE_RBAC" = "true" ]; then
              echo "  ✅ $KV — RBAC authorization enabled (Managed Identity friendly)"
            else
              echo "  ⚠️  $KV — using legacy access policies; verify no service-principal client-secret grants"
            fi
          done

          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS Key Vault configuration violation(s) — remediate before go-live"
            exit 1
          fi
          echo "✅ Key Vault audit passed"

      - name: Key Vault audit summary
        if: always()
        run: |
          {
            echo "## Key Vault HIPAA Audit (Sprint 11)"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| ACA env var raw-secret check | ${{ steps.env-audit.outcome }} |"
            echo "| Key Vault soft-delete + RBAC  | ${{ steps.kv-policy-audit.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 8. Summary report ─────────────────────────────────────────────────────
  compliance-summary:
    name: Compliance Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, owasp-zap, k6-load-test, lighthouse, nuget-vuln-scan, npm-audit, keyvault-audit]
    if: always()
    steps:
      - name: Print result
        run: |
          {
            echo "## Compliance Gate Results"
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Trivy CVE Scan         | ${{ needs.trivy-scan.result }} |"
            echo "| OWASP ZAP              | ${{ needs.owasp-zap.result }} |"
            echo "| k6 Load Test (P95)     | ${{ needs.k6-load-test.result }} |"
            echo "| Lighthouse Perf >90    | ${{ needs.lighthouse.result }} |"
            echo "| NuGet Vuln Scan        | ${{ needs.nuget-vuln-scan.result }} |"
            echo "| npm Audit              | ${{ needs.npm-audit.result }} |"
            echo "| Key Vault HIPAA Audit  | ${{ needs.keyvault-audit.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
