name: Frontend MFE CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  detect-mfe-changes:
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      voice-mfe: ${{ steps.filter.outputs.voice-mfe }}
      triage-mfe: ${{ steps.filter.outputs.triage-mfe }}
      scheduling-mfe: ${{ steps.filter.outputs.scheduling-mfe }}
      pophealth-mfe: ${{ steps.filter.outputs.pophealth-mfe }}
      revenue-mfe: ${{ steps.filter.outputs.revenue-mfe }}
      encounters-mfe: ${{ steps.filter.outputs.encounters-mfe }}
      engagement-mfe: ${{ steps.filter.outputs.engagement-mfe }}
      any-changed: ${{ steps.build-matrix.outputs.any-changed }}
      deploy-matrix: ${{ steps.build-matrix.outputs.deploy-matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shell:          ['frontend/apps/shell/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']
            voice-mfe:      ['frontend/apps/voice-mfe/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']
            triage-mfe:     ['frontend/apps/triage-mfe/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']
            scheduling-mfe: ['frontend/apps/scheduling-mfe/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']
            pophealth-mfe:  ['frontend/apps/pophealth-mfe/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']
            revenue-mfe:    ['frontend/apps/revenue-mfe/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']
            encounters-mfe: ['frontend/apps/encounters-mfe/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']
            engagement-mfe: ['frontend/apps/engagement-mfe/**', 'frontend/packages/**', 'frontend/locales/**', 'frontend/package.json', 'frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml', 'frontend/turbo.json', 'frontend/.npmrc', 'frontend/vitest.setup.ts', 'frontend/vitest.workspace.ts']

      - name: Build deploy matrix
        id: build-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SHELL_CHANGED: ${{ steps.filter.outputs.shell }}
          VOICE_CHANGED: ${{ steps.filter.outputs.voice-mfe }}
          TRIAGE_CHANGED: ${{ steps.filter.outputs.triage-mfe }}
          SCHEDULING_CHANGED: ${{ steps.filter.outputs.scheduling-mfe }}
          POPHEALTH_CHANGED: ${{ steps.filter.outputs.pophealth-mfe }}
          REVENUE_CHANGED: ${{ steps.filter.outputs.revenue-mfe }}
          ENCOUNTERS_CHANGED: ${{ steps.filter.outputs.encounters-mfe }}
          ENGAGEMENT_CHANGED: ${{ steps.filter.outputs.engagement-mfe }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os

          apps = [
              ('shell', os.environ['SHELL_CHANGED'], 'SHELL_DEPLOY_TOKEN'),
              ('voice-mfe', os.environ['VOICE_CHANGED'], 'VOICE_MFE_DEPLOY_TOKEN'),
              ('triage-mfe', os.environ['TRIAGE_CHANGED'], 'TRIAGE_MFE_DEPLOY_TOKEN'),
              ('scheduling-mfe', os.environ['SCHEDULING_CHANGED'], 'SCHEDULING_MFE_DEPLOY_TOKEN'),
              ('pophealth-mfe', os.environ['POPHEALTH_CHANGED'], 'POPHEALTH_MFE_DEPLOY_TOKEN'),
              ('revenue-mfe', os.environ['REVENUE_CHANGED'], 'REVENUE_MFE_DEPLOY_TOKEN'),
              ('encounters-mfe', os.environ['ENCOUNTERS_CHANGED'], 'ENCOUNTERS_MFE_DEPLOY_TOKEN'),
              ('engagement-mfe', os.environ['ENGAGEMENT_CHANGED'], 'ENGAGEMENT_MFE_DEPLOY_TOKEN'),
          ]

          force_all = os.environ['EVENT_NAME'] == 'workflow_dispatch'
          include = []
          any_changed = False

          for app, changed, deploy_token_secret in apps:
              if changed == 'true':
                  any_changed = True

              if force_all or changed == 'true':
                  include.append(
                      {
                          'app': app,
                          'changed': changed,
                          'deploy_token_secret': deploy_token_secret,
                      }
                  )

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"any-changed={'true' if any_changed else 'false'}\n")
              fh.write(f"deploy-matrix={json.dumps({'include': include})}\n")
          PYEOF

  build-and-deploy:
    needs: detect-mfe-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.detect-mfe-changes.outputs.any-changed == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-mfe-changes.outputs.deploy-matrix) }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'

      - uses: pnpm/action-setup@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          version: '9'

      - uses: actions/setup-node@v4
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm --filter ${{ matrix.app }} run lint --if-present

      - name: Type check
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm --filter ${{ matrix.app }} type-check

      - name: Build
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: frontend
        run: pnpm --filter ${{ matrix.app }} build
        env:
          # Point MFE/Shell builds at the public ACA gateway. APIM is
          # provisioned but has no operations configured, so every
          # /health, /api/v1/* call returns 404. Until APIM operations
          # are imported, route directly to the YARP gateway which has
          # the actual route map.
          VITE_API_BASE_URL: ${{ vars.HEALTHQ_GATEWAY_ACA_URL || 'https://gateway.gentletree-fe920881.eastus2.azurecontainerapps.io' }}
          VITE_SIGNALR_HUB_URL: ""
          VITE_BFF_URL: ${{ vars.HEALTHQ_GATEWAY_ACA_URL || 'https://gateway.gentletree-fe920881.eastus2.azurecontainerapps.io' }}
          VITE_BFF_WS_URL: ${{ vars.HEALTHQ_GATEWAY_ACA_WSS_URL || 'wss://gateway.gentletree-fe920881.eastus2.azurecontainerapps.io' }}
          # Entra/MSAL — opt-in real auth. Leave repo vars unset to keep
          # the front-end in demo mode (no token, gateway DemoAnonymous).
          VITE_AZURE_AD_CLIENT_ID: ${{ vars.HEALTHQ_AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_ISSUER:    ${{ vars.HEALTHQ_AZURE_AD_ISSUER }}
          VITE_AZURE_AD_AUDIENCE:  ${{ vars.HEALTHQ_AZURE_AD_AUDIENCE }}
          VITE_REDIRECT_URI:       ${{ vars.HEALTHQ_AZURE_AD_REDIRECT_URI }}
          VITE_POST_LOGOUT_REDIRECT_URI: ${{ vars.HEALTHQ_AZURE_AD_POST_LOGOUT_REDIRECT_URI }}
          VOICE_MFE_URL: https://happy-smoke-0ba02780f.7.azurestaticapps.net/remoteEntry.js
          TRIAGE_MFE_URL: https://brave-hill-0d76ab10f.7.azurestaticapps.net/remoteEntry.js
          SCHEDULING_MFE_URL: https://yellow-smoke-0e7b6b70f.7.azurestaticapps.net/remoteEntry.js
          POPHEALTH_MFE_URL: https://orange-bay-00f28280f.7.azurestaticapps.net/remoteEntry.js
          REVENUE_MFE_URL: https://lemon-pond-067d2f40f.7.azurestaticapps.net/remoteEntry.js
          ENCOUNTERS_MFE_URL: ${{ secrets.ENCOUNTERS_MFE_URL || 'https://calm-river-02bddc70f.7.azurestaticapps.net/remoteEntry.js' }}
          ENGAGEMENT_MFE_URL: ${{ secrets.ENGAGEMENT_MFE_URL || 'https://agreeable-hill-0d3115b0f.7.azurestaticapps.net/remoteEntry.js' }}

      - name: Copy SWA config to dist
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -f "frontend/apps/${{ matrix.app }}/staticwebapp.config.json" ]; then
            cp frontend/apps/${{ matrix.app }}/staticwebapp.config.json frontend/apps/${{ matrix.app }}/dist/
          fi

      - name: Deploy to Azure Static Web Apps
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets[matrix.deploy_token_secret] }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/apps/${{ matrix.app }}/dist
          output_location: ''
          skip_app_build: true

      - name: Generate SWA deploy evidence
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          DATE_TAG=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          mkdir -p /tmp/swa-evidence

          cat > /tmp/swa-evidence/deploy-evidence.md << EOF
          # SWA Deploy Evidence — ${{ matrix.app }}

          | Field | Value |
          |---|---|
          | App | ${{ matrix.app }} |
          | SHA | ${{ github.sha }} |
          | Run | ["${GITHUB_RUN_ID}"]("${RUN_URL}") |
          | Generated | "${DATE_TAG}" |

          ## Completed Gates

          - [x] pnpm install (frozen lockfile)
          - [x] ESLint and TypeScript type-check
          - [x] Vitest unit tests with coverage
          - [x] pnpm build (Vite production bundle)
          - [x] Bundle size budgets (bundlewatch)
          - [x] Azure Static Web Apps deploy action completed
          EOF

      - name: Upload SWA deploy evidence
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: swa-deploy-evidence-${{ matrix.app }}-${{ github.sha }}
          path: /tmp/swa-evidence/deploy-evidence.md
          if-no-files-found: error
          retention-days: 30

      # ── Post-deploy availability check ───────────────────────────────────────
      # Verify that the specific app deployed in this matrix row is externally
      # reachable after SWA propagation. Remote MFEs must serve remoteEntry.js.
      - name: Post-deploy availability check
        if: >
          (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main'
        run: |
          case "${{ matrix.app }}" in
            shell)
              VERIFY_URL="https://gentle-tree-03115af0f.7.azurestaticapps.net"
              VERIFY_KIND="shell"
              ;;
            voice-mfe)
              VERIFY_URL="https://happy-smoke-0ba02780f.7.azurestaticapps.net/remoteEntry.js"
              VERIFY_KIND="remote-entry"
              ;;
            triage-mfe)
              VERIFY_URL="https://brave-hill-0d76ab10f.7.azurestaticapps.net/remoteEntry.js"
              VERIFY_KIND="remote-entry"
              ;;
            scheduling-mfe)
              VERIFY_URL="https://yellow-smoke-0e7b6b70f.7.azurestaticapps.net/remoteEntry.js"
              VERIFY_KIND="remote-entry"
              ;;
            pophealth-mfe)
              VERIFY_URL="https://orange-bay-00f28280f.7.azurestaticapps.net/remoteEntry.js"
              VERIFY_KIND="remote-entry"
              ;;
            revenue-mfe)
              VERIFY_URL="https://lemon-pond-067d2f40f.7.azurestaticapps.net/remoteEntry.js"
              VERIFY_KIND="remote-entry"
              ;;
            encounters-mfe)
              VERIFY_URL="${{ secrets.ENCOUNTERS_MFE_URL || 'https://calm-river-02bddc70f.7.azurestaticapps.net/remoteEntry.js' }}"
              VERIFY_KIND="remote-entry"
              ;;
            engagement-mfe)
              VERIFY_URL="${{ secrets.ENGAGEMENT_MFE_URL || 'https://agreeable-hill-0d3115b0f.7.azurestaticapps.net/remoteEntry.js' }}"
              VERIFY_KIND="remote-entry"
              ;;
            *)
              echo "::error::Unsupported frontend app '${{ matrix.app }}'"
              exit 1
              ;;
          esac

          echo "Waiting for SWA propagation for ${{ matrix.app }}..."
          TMP_FILE=$(mktemp)
          trap 'rm -f "$TMP_FILE"' EXIT

          for i in $(seq 1 9); do
            STATUS=$(curl -sS -o "$TMP_FILE" -w '%{http_code}' "$VERIFY_URL" 2>/dev/null || echo 000)
            SIZE=$(wc -c < "$TMP_FILE" 2>/dev/null || echo 0)
            echo "  Attempt $i/9: HTTP $STATUS, bytes $SIZE"

            if [ "$VERIFY_KIND" = "shell" ] && [ "$STATUS" = "200" ]; then
              break
            fi

            if [ "$VERIFY_KIND" = "remote-entry" ] && [ "$STATUS" = "200" ] && [ "$SIZE" -gt 0 ]; then
              break
            fi

            sleep 10
          done

          if [ "$VERIFY_KIND" = "shell" ] && [ "$STATUS" != "200" ]; then
            echo "::error::${{ matrix.app }} did not return HTTP 200 after deploy (last status: $STATUS)"
            exit 1
          fi

          if [ "$VERIFY_KIND" = "remote-entry" ] && { [ "$STATUS" != "200" ] || [ "$SIZE" -le 0 ]; }; then
            echo "::error::${{ matrix.app }} remoteEntry.js was not served correctly after deploy (status: $STATUS, bytes: $SIZE)"
            exit 1
          fi

          echo "✅ ${{ matrix.app }} is live at $VERIFY_URL" >> "$GITHUB_STEP_SUMMARY"

