name: Credential Hygiene Audit

# Scans all source files for hardcoded credential patterns:
#   HIGH (blocking) — Azure connection strings, private keys, AWS access keys,
#     hardcoded passwords, FHIR-specific secrets, Bearer tokens.
#   MEDIUM (advisory) — localhost DB connections, environment variable fallbacks,
#     hardcoded Azure endpoint URLs.
#
# HIPAA-critical control: hardcoded PHI-adjacent credentials in source are an
# immediate breach risk. Runs as a PR gate and weekly on Monday.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'    # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  credential-hygiene:
    name: Credential Hygiene Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan for hardcoded credentials
        id: scan
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // ── HIGH-confidence patterns (block merge) ────────────────────
            const HIGH_PATTERNS = [
              { name: 'Azure Storage Connection String', pattern: /DefaultEndpointsProtocol=https;AccountName=[^;]{3,};AccountKey=[A-Za-z0-9+/=]{40,}/i },
              { name: 'Azure SAS Token',                 pattern: /sv=\d{4}-\d{2}-\d{2}[^"'\s]{10,}&sig=[A-Za-z0-9%+/=]{20,}/i },
              { name: 'Azure Client Secret (GUID)',       pattern: /clientSecret["']?\s*[=:]\s*["']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}["']?/i },
              { name: 'PEM Private Key Block',            pattern: /-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----/ },
              { name: 'AWS Access Key ID',                pattern: /AKIA[0-9A-Z]{16}/ },
              { name: 'Hardcoded Password Value',         pattern: /["']?[Pp]assword["']?\s*[=:]\s*["'][^"'${}@\s]{8,}["']/ },
              { name: 'SQL Connection String',            pattern: /[Cc]onnection[Ss]tring\s*[=:]\s*["']Server=[^"']{15,}["']/ },
              { name: 'Bearer Token (JWT literal)',       pattern: /[Aa]uthorization['"]\s*[=:]\s*["']Bearer\s+ey[A-Za-z0-9\-_]{20,}\.ey[A-Za-z0-9\-_]{20,}/ },
              { name: 'Generic API Key (≥20 chars)',      pattern: /api[_-]?key\s*[=:]\s*["'][A-Za-z0-9_\-]{20,}["']/i },
              { name: 'FHIR Service Secret',              pattern: /fhir[_\-]?(secret|key|token|password)\s*[=:]\s*["'][^"'${}]{8,}["']/i },
              { name: 'Stripe Secret Key',                pattern: /sk_(live|test)_[0-9a-zA-Z]{24}/ },
              { name: 'SendGrid API Key',                 pattern: /SG\.[A-Za-z0-9\-_]{22}\.[A-Za-z0-9\-_]{43}/ },
            ];

            // ── MEDIUM-confidence patterns (advisory, non-blocking) ────────
            const WARN_PATTERNS = [
              { name: 'Localhost DB with password',       pattern: /Server=localhost[^"']*[Pp]assword=/i },
              { name: 'Azure endpoint hardcoded URL',     pattern: /https?:\/\/[a-z0-9\-]+\.(azure\.com|windows\.net|microsoftonline\.com|blob\.core\.windows\.net)[^"'\s]{10,}/i },
              { name: 'Env variable fallback hardcode',   pattern: /GetEnvironmentVariable\(["'][A-Z_]{3,}["']\)\s*\?\?\s*["'][^"']{8,}["']/ },
            ];

            // ── File extensions to include ────────────────────────────────
            const SCAN_EXTENSIONS = new Set([
              '.cs', '.ts', '.tsx', '.js', '.jsx',
              '.json', '.yaml', '.yml', '.env', '.config', '.xml', '.csproj',
            ]);

            // ── Paths to skip entirely ────────────────────────────────────
            const SKIP_PATTERNS = [
              /[/\\]node_modules[/\\]/,
              /[/\\]\.git[/\\]/,
              /[/\\]dist[/\\]/,
              /[/\\]build[/\\]/,
              /[/\\]coverage[/\\]/,
              /[/\\]\.next[/\\]/,
              /[/\\]storybook-static[/\\]/,
              /appsettings\.Development\.json$/,
              /appsettings\.Example\.json$/,
              /\.example$/i,
              /\.sample$/i,
              /[/\\]__tests__[/\\]/,
              /\.spec\.(ts|tsx|js|jsx)$/,
              /\.test\.(ts|tsx|js|jsx)$/,
              /[/\\]test[/\\].*fixtures?/i,
              /[/\\]mocks?[/\\]/i,
            ];

            const shouldSkip = (fp) => SKIP_PATTERNS.some((p) => p.test(fp));

            const findings = [];    // HIGH — blocking
            const advisories = []; // MEDIUM — advisory

            const walkDir = (dir) => {
              let entries;
              try { entries = fs.readdirSync(dir, { withFileTypes: true }); } catch { return; }
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                const relative = fullPath.replace(/\\/g, '/').replace(/^\.\//, '');
                if (shouldSkip(relative)) continue;
                if (entry.isDirectory()) {
                  walkDir(fullPath);
                } else if (entry.isFile()) {
                  const ext = path.extname(entry.name).toLowerCase();
                  if (!SCAN_EXTENSIONS.has(ext)) continue;
                  let content;
                  try { content = fs.readFileSync(fullPath, 'utf8'); } catch { continue; }
                  const lines = content.split('\n');
                  for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    // Skip comment-only lines and placeholder patterns
                    if (/^\s*(\/\/|#|<!--|\*\s)/.test(line)) continue;
                    if (/\$\{|__PLACEHOLDER__|YOUR_|REPLACE_ME|<your|TODO:|SAMPLE/i.test(line)) continue;
                    for (const { name, pattern } of HIGH_PATTERNS) {
                      if (pattern.test(line)) {
                        findings.push({
                          file: relative,
                          line: i + 1,
                          rule: name,
                          excerpt: line.trim().slice(0, 120),
                        });
                      }
                    }
                    for (const { name, pattern } of WARN_PATTERNS) {
                      if (pattern.test(line)) {
                        advisories.push({
                          file: relative,
                          line: i + 1,
                          rule: name,
                          excerpt: line.trim().slice(0, 120),
                        });
                      }
                    }
                  }
                }
              }
            };

            walkDir('.');

            // ── Build report ──────────────────────────────────────────────
            const dateTag = new Date().toISOString().slice(0, 10);
            const hasCritical = findings.length > 0;

            const reportLines = [
              '# Credential Hygiene Audit',
              '',
              `Generated: ${new Date().toISOString()}`,
              `Status: **${!hasCritical ? '✅ PASS' : '❌ FAIL — hardcoded credential pattern(s) detected'}**`,
              '',
              `HIGH findings: ${findings.length}`,
              `MEDIUM advisories: ${advisories.length}`,
              '',
            ];

            if (findings.length > 0) {
              reportLines.push('## ❌ HIGH — Hardcoded Credential Patterns (blocking)');
              reportLines.push('');
              reportLines.push('| File | Line | Rule | Excerpt |');
              reportLines.push('|---|---:|---|---|');
              for (const f of findings) {
                const safe = f.excerpt.replace(/\|/g, '\\|');
                reportLines.push(`| \`${f.file}\` | ${f.line} | ${f.rule} | \`${safe}\` |`);
              }
              reportLines.push('');
              reportLines.push('> **Required action**: Remove all hardcoded credentials immediately.');
              reportLines.push('> Store secrets in Azure Key Vault (production) or GitHub Secrets (CI). Reference via environment variables only.');
              reportLines.push('> HIPAA § 164.312(a)(2)(iv) — Encryption and decryption of ePHI requires access controls that must not be embedded in source code.');
              reportLines.push('');
            } else {
              reportLines.push('## HIGH Findings');
              reportLines.push('');
              reportLines.push('✅ No high-confidence hardcoded credential patterns found.');
              reportLines.push('');
            }

            if (advisories.length > 0) {
              reportLines.push('## ⚠️ MEDIUM — Advisory Patterns (non-blocking)');
              reportLines.push('');
              reportLines.push('| File | Line | Rule | Excerpt |');
              reportLines.push('|---|---:|---|---|');
              for (const a of advisories) {
                const safe = a.excerpt.replace(/\|/g, '\\|');
                reportLines.push(`| \`${a.file}\` | ${a.line} | ${a.rule} | \`${safe}\` |`);
              }
              reportLines.push('');
              reportLines.push('> Review these patterns. Ensure runtime values are injected from Azure Key Vault or environment-specific configuration, not hardcoded strings.');
              reportLines.push('');
            } else {
              reportLines.push('## MEDIUM Advisories');
              reportLines.push('');
              reportLines.push('✅ No medium-confidence advisory patterns found.');
              reportLines.push('');
            }

            const report = reportLines.join('\n') + '\n';

            const outputDir = 'artifacts/credential-hygiene';
            fs.mkdirSync(outputDir, { recursive: true });
            const reportPath = `${outputDir}/credential-hygiene-${dateTag}.md`;
            fs.writeFileSync(reportPath, report, 'utf8');

            core.setOutput('report_path', reportPath);
            core.setOutput('report_name', `credential-hygiene-${dateTag}`);

            await core.summary.addRaw(report, true).write();

            if (hasCritical) {
              core.setFailed(`Credential hygiene: ${findings.length} high-confidence hardcoded credential pattern(s) found. Remove before merging.`);
            }

      - name: Upload credential hygiene artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.scan.outputs.report_name }}
          path: ${{ steps.scan.outputs.report_path }}
          if-no-files-found: error
          retention-days: 60
