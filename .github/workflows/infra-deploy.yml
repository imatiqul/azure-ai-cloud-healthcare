name: Infrastructure Deploy

# Push trigger disabled while in local development. Re-enable when infra changes are ready.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      skip_aks_bootstrap:
        description: 'Skip AKS bootstrap (ArgoCD/KEDA already installed)'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: healthq-copilot-rg
  AKS_CLUSTER_NAME: healthq-copilot-aks
  BICEP_CLI_VERSION: v0.42.1
  KEDA_CHART_VERSION: 2.19.0
  KUBE_PROMETHEUS_STACK_CHART_VERSION: 84.1.0
  INGRESS_NGINX_CHART_VERSION: 4.15.1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install --version ${{ env.BICEP_CLI_VERSION }}

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Validate Bicep
        run: |
          az bicep build --file infra/bicep/main.bicep
          az deployment sub validate \
            --location eastus2 \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.${{ inputs.environment || 'dev' }}.bicepparam

      - name: Validate Helm chart
        run: |
          ENVIRONMENT="${{ inputs.environment || 'dev' }}"

          if [ "$ENVIRONMENT" = "prod" ]; then
            VALUES_FILE="infra/helm/values.production.yaml"
          else
            VALUES_FILE="infra/helm/values.dev.yaml"
          fi

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Missing values file: $VALUES_FILE"
            exit 1
          fi

          helm lint infra/helm \
            -f infra/helm/values.yaml \
            -f "$VALUES_FILE"

          helm template healthq-copilot infra/helm \
            -f infra/helm/values.yaml \
            -f "$VALUES_FILE" \
            > /tmp/healthq-copilot.rendered.yaml

          test -s /tmp/healthq-copilot.rendered.yaml

      - name: Upload rendered Helm manifest
        uses: actions/upload-artifact@v7
        with:
          name: helm-rendered-${{ inputs.environment || 'dev' }}
          path: /tmp/healthq-copilot.rendered.yaml
          if-no-files-found: error
          retention-days: 7

      - name: Preview infrastructure changes (what-if)
        run: |
          az deployment sub what-if \
            --location eastus2 \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.${{ inputs.environment || 'dev' }}.bicepparam \
            --exclude-change-types Ignore NoChange

      - name: Generate release evidence checklist
        run: |
          ENVIRONMENT="${{ inputs.environment || 'dev' }}"
          DATE_TAG=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          mkdir -p /tmp/release-evidence

          cat > /tmp/release-evidence/release-checklist.md << EOF
          # Release Evidence Checklist

          | Field | Value |
          |---|---|
          | Environment | ${ENVIRONMENT} |
          | SHA | ${{ github.sha }} |
          | Run | [${GITHUB_RUN_ID}](${RUN_URL}) |
          | Generated | ${DATE_TAG} |

          ## Infrastructure Validation Evidence

          - [x] Bicep template compiled without errors
          - [x] Bicep deployment validated (subscription-scope what-if completed)
          - [x] Helm chart linted for target environment (${ENVIRONMENT})
          - [x] Helm chart rendered to manifest (see \`helm-rendered-${ENVIRONMENT}\` artifact)
          - [x] Infrastructure change preview (what-if) completed without unexpected changes

          ## Required PR Gate Evidence

          The following checks must have passed on the merge commit before this deploy:

          - [ ] \`pr-validation\` — dotnet build, format, unit tests, integration tests, coverage
          - [ ] \`workflow-lint\` — actionlint clean on changed workflow files
          - [ ] \`helm-chart-validation\` — Helm lint and render clean
          - [ ] \`api-route-ownership-governance\` — route ownership map alignment verified

          ## Post-Deploy Required Evidence

          - [ ] \`cloud-e2e-tests.yml\` — smoke and full E2E pass on deployed SHA
          - [ ] \`gateway-route-probes.yml\` — no critical route 404/405/502/503/504

          ## Release Reviewer Acknowledgement

          - [ ] All infrastructure validation evidence above confirmed
          - [ ] Post-deploy validation workflows triggered and in-progress
          - [ ] Any manual exceptions documented in incident or release record
          EOF

          echo "Release evidence checklist generated at /tmp/release-evidence/release-checklist.md"

      - name: Upload release evidence checklist
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-${{ inputs.environment || 'dev' }}-${{ github.sha }}
          path: /tmp/release-evidence/release-checklist.md
          if-no-files-found: error
          retention-days: 30

  deploy-infrastructure:
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      aks_cluster_name: ${{ steps.deploy.outputs.aksClusterName }}
      acr_login_server: ${{ steps.deploy.outputs.acrLoginServer }}
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install --version ${{ env.BICEP_CLI_VERSION }}

      - name: Deploy Bicep infrastructure
        id: deploy
        run: |
          RESULT=$(az deployment sub create \
            --location eastus2 \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.${{ inputs.environment || 'dev' }}.bicepparam \
            --name "deploy-$(date +%Y%m%d%H%M%S)" \
            --query 'properties.outputs' \
            --output json)
          echo "aksClusterName=$(echo "$RESULT" | jq -r '.aksClusterName.value // "healthq-copilot-aks"')" >> "$GITHUB_OUTPUT"
          echo "acrLoginServer=$(echo "$RESULT" | jq -r '.acrLoginServer.value // "healthqcopilot.azurecr.io"')" >> "$GITHUB_OUTPUT"

  bootstrap-aks:
    needs: deploy-infrastructure
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !inputs.skip_aks_bootstrap
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS kubeconfig
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ needs.deploy-infrastructure.outputs.aks_cluster_name || env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.8/manifests/install.yaml
          kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s

      - name: Install Argo Rollouts
        run: |
          kubectl create namespace argo-rollouts --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/download/v1.9.0/install.yaml
          kubectl wait --for=condition=available deployment/argo-rollouts -n argo-rollouts --timeout=300s

      - name: Install KEDA
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm upgrade --install keda kedacore/keda \
            --version ${{ env.KEDA_CHART_VERSION }} \
            --namespace keda \
            --create-namespace \
            --set watchNamespace=healthq-copilot \
            --wait --timeout=5m

      - name: Install kube-prometheus-stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --version ${{ env.KUBE_PROMETHEUS_STACK_CHART_VERSION }} \
            --namespace monitoring \
            --create-namespace \
            --set grafana.adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --wait --timeout=10m

      - name: Apply network policies
        run: |
          kubectl apply -f infra/k8s/network-policies/ --recursive || true

      - name: Apply KEDA ScaledObjects
        run: |
          kubectl apply -f infra/k8s/keda/ --recursive || true

      - name: Install Nginx Ingress Controller (internal Azure Load Balancer)
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --version ${{ env.INGRESS_NGINX_CHART_VERSION }} \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-internal"="true" \
            --set controller.replicaCount=2 \
            --set controller.nodeSelector."kubernetes\.io/os"=linux \
            --set defaultBackend.nodeSelector."kubernetes\.io/os"=linux \
            --wait --timeout=5m

      - name: Bootstrap ArgoCD Application
        run: |
          # Patch ArgoCD Application with secrets before applying
          kubectl apply -f infra/argocd/project.yaml
          kubectl apply -f infra/argocd/application${{ inputs.environment == 'dev' && '-dev' || '' }}.yaml

      - name: Wait for ArgoCD sync
        run: |
          # Give ArgoCD 60s to detect and begin sync
          sleep 60
          kubectl get applications -n argocd -o wide || true

  # ---------------------------------------------------------------------------
  # configure-apim: runs AFTER bootstrap-aks so the Nginx ingress IP is known.
  # Updates the APIM backend URL to point at the ingress internal load balancer.
  # ---------------------------------------------------------------------------
  configure-apim:
    needs: [deploy-infrastructure, bootstrap-aks]
    if: >
      needs.deploy-infrastructure.result == 'success' &&
      (needs.bootstrap-aks.result == 'success' || needs.bootstrap-aks.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    env:
      APIM_NAME: healthqcopilot-${{ inputs.environment || 'dev' }}-apim
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ needs.deploy-infrastructure.outputs.aks_cluster_name || env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Wait for Nginx Ingress IP assignment
        id: ingress
        run: |
          echo "Waiting for Nginx Ingress Controller LoadBalancer IP..."
          for i in $(seq 1 24); do
            IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$IP" ]; then
              echo "Ingress IP: $IP"
              echo "ip=$IP" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i/24 — IP not yet assigned, retrying in 15s..."
            sleep 15
          done
          echo "⚠️ Ingress IP not available after 6 minutes — skipping APIM backend update"
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Update APIM backend URL to AKS ingress internal IP
        if: steps.ingress.outputs.skip != 'true'
        run: |
          INGRESS_URL="http://${{ steps.ingress.outputs.ip }}"
          echo "Setting APIM backend to: $INGRESS_URL"

          # Update the named backend created by Bicep
          az apim backend update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --service-name "${{ env.APIM_NAME }}" \
            --backend-id aks-ingress-backend \
            --url "$INGRESS_URL" \
            --protocol http

          # Also update the API's serviceUrl so the developer portal shows the correct backend
          az apim api update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --service-name "${{ env.APIM_NAME }}" \
            --api-id healthq-copilot-api \
            --service-url "$INGRESS_URL"

          echo "✅ APIM backend updated to $INGRESS_URL"

      - name: Verify APIM API routes are registered
        if: steps.ingress.outputs.skip != 'true'
        run: |
          ROUTE_COUNT=$(az apim api operation list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --service-name "${{ env.APIM_NAME }}" \
            --api-id healthq-copilot-api \
            --query 'length(@)' --output tsv 2>/dev/null || echo "0")
          echo "APIM API operations registered: $ROUTE_COUNT"
          if [ "$ROUTE_COUNT" -lt "10" ]; then
            echo "⚠️ Fewer than 10 operations found — APIM import may not have applied correctly"
            exit 1
          fi
          echo "✅ APIM routes verified ($ROUTE_COUNT operations)"

