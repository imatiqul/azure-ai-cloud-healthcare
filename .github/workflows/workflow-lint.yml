name: Workflow Lint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/workflows/workflow-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve workflow files to lint
        id: files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- '.github/workflows/*.yml' '.github/workflows/*.yaml' > /tmp/workflow-files.txt
          else
            find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort > /tmp/workflow-files.txt
          fi

          if [ ! -s /tmp/workflow-files.txt ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILE_ARGS=$(tr '\n' ' ' < /tmp/workflow-files.txt)
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "file_args=$FILE_ARGS" >> "$GITHUB_OUTPUT"

          {
            echo "## Workflow Lint Scope"
            echo ""
            sed 's/^/- /' /tmp/workflow-files.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run actionlint (changed workflow files)
        if: steps.files.outputs.has_files == 'true'
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            rhysd/actionlint:latest \
            -color \
            -ignore 'SC2086|SC2129|SC2034' \
            ${{ steps.files.outputs.file_args }}

      - name: No workflow changes
        if: steps.files.outputs.has_files != 'true'
        run: echo "No workflow files changed; nothing to lint."
